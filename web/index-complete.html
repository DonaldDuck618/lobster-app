<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#667eea">
  <title>赚好多能虾助手 - 让 AI 真正为你工作</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #fff; min-height: 100vh; overflow: hidden; }
    .app-container { display: flex; height: 100vh; height: 100dvh; }
    .sidebar { width: 280px; background: #fafafa; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; padding: 16px; }
    .logo-area { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 20px; }
    .logo-img { width: 40px; height: 40px; border-radius: 10px; }
    .logo-text { font-size: 18px; font-weight: 600; color: #1a1a1a; }
    .new-chat-btn { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; }
    .history-section { flex: 1; overflow-y: auto; }
    .history-title { font-size: 12px; color: #999; margin-bottom: 12px; padding: 0 8px; }
    .history-item { padding: 12px; border-radius: 8px; cursor: pointer; color: #333; margin-bottom: 4px; transition: background 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .history-item:active { background: #f0f0f0; }
    .history-item.active { background: #e8eaff; color: #667eea; }
    .user-area { padding-top: 16px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 12px; border-radius: 8px; }
    .user-area:active { background: #f0f0f0; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 14px; flex-shrink: 0; }
    .user-name { flex: 1; font-size: 14px; color: #333; overflow: hidden; text-overflow: ellipsis; }
    .main-content { flex: 1; display: flex; flex-direction: column; background: #fff; overflow: hidden; }
    .welcome-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; overflow-y: auto; }
    .welcome-logo { width: 100px; height: 100px; border-radius: 20px; box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3); margin-bottom: 24px; }
    .welcome-title { font-size: 32px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; text-align: center; }
    .welcome-subtitle { font-size: 16px; color: #666; margin-bottom: 48px; text-align: center; }
    .suggestion-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; width: 100%; max-width: 900px; }
    .suggestion-card { background: #fafafa; border: 1px solid #f0f0f0; border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; min-height: 80px; display: flex; flex-direction: column; justify-content: center; }
    .suggestion-card:active { background: #f5f5f5; border-color: #667eea; transform: scale(0.98); }
    .suggestion-icon { font-size: 24px; margin-bottom: 8px; }
    .suggestion-text { font-size: 14px; color: #333; line-height: 1.5; }
    .chat-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .messages-container { flex: 1; overflow-y: auto; padding: 40px 20px; -webkit-overflow-scrolling: touch; scroll-behavior: smooth; max-height: calc(100vh - 200px); }
    .message-wrapper { display: flex; gap: 16px; margin-bottom: 24px; max-width: 800px; margin-left: auto; margin-right: auto; }
    .message-wrapper.user { flex-direction: row-reverse; }
    .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-weight: 600; font-size: 14px; }
    .message-wrapper.assistant .message-avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .message-wrapper.user .message-avatar { background: #f0f0f0; color: #666; }
    .message-bubble { max-width: 70%; padding: 14px 18px; border-radius: 16px; line-height: 1.6; font-size: 15px; word-wrap: break-word; overflow-wrap: break-word; }
    .message-wrapper.assistant .message-bubble { background: #fafafa; color: #1a1a1a; border-bottom-left-radius: 4px; }
    .message-wrapper.user .message-bubble { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-bottom-right-radius: 4px; }
    .message-bubble p { margin: 8px 0; }
    .message-bubble pre { background: #f5f5f5; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
    .message-bubble code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-family: 'Courier New', monospace; }
    .message-bubble pre code { background: none; padding: 0; }
    .message-bubble ul, .message-bubble ol { padding-left: 20px; margin: 8px 0; }
    .message-bubble li { margin: 4px 0; }
    .message-bubble h1, .message-bubble h2, .message-bubble h3 { margin: 12px 0 8px; font-weight: 600; }
    .message-bubble h1 { font-size: 24px; }
    .message-bubble h2 { font-size: 20px; }
    .message-bubble h3 { font-size: 17px; }
    .message-bubble blockquote { border-left: 4px solid #667eea; padding-left: 12px; margin: 8px 0; color: #666; }
    .message-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; }
    .message-bubble th, .message-bubble td { border: 1px solid #ddd; padding: 8px; }
    .message-bubble th { background: #f5f5f5; font-weight: 600; }
    .input-area { padding: 16px; border-top: 1px solid #f0f0f0; background: #fff; }
    .input-wrapper { max-width: 800px; margin: 0 auto; position: relative; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
    .tool-btn { padding: 8px 14px; background: #f5f5f5; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; transition: all 0.2s; display: flex; align-items: center; gap: 6px; }
    .tool-btn:active { background: #e5e5e5; }
    .input-box { background: #fafafa; border: 1px solid #f0f0f0; border-radius: 16px; padding: 12px 60px 12px 16px; display: flex; align-items: flex-end; transition: border-color 0.2s; }
    .input-box:focus-within { border-color: #667eea; background: #fff; }
    .input-box textarea { flex: 1; border: none; outline: none; background: transparent; font-size: 16px; resize: none; max-height: 150px; font-family: inherit; line-height: 1.5; min-height: 24px; }
    .input-box textarea::placeholder { color: #999; }
    .send-btn { position: absolute; right: 10px; bottom: 10px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.2s; }
    .send-btn:active { transform: scale(0.95); }
    .send-btn svg { width: 20px; height: 20px; fill: white; }
    @media (max-width: 768px) { .sidebar { display: none; } .messages-container { padding: 70px 16px 16px; } .message-bubble { max-width: 85%; } .welcome-container { padding: 80px 20px 20px; } .welcome-logo { width: 80px; height: 80px; } .welcome-title { font-size: 24px; } .suggestion-grid { grid-template-columns: 1fr; } .toolbar { display: none; } }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="sidebar">
      <div class="logo-area"><img src="logo.jpg" alt="赚好多能虾助手" class="logo-img"><span class="logo-text">赚好多能虾助手</span></div>
      <button class="new-chat-btn" onclick="newChat()"><span>+</span> 新建对话</button>
      <div class="history-section"><div class="history-title">最近对话</div><div id="historyList"></div></div>
      <div class="user-area" onclick="showUserMenu()"><div class="user-avatar" id="userAvatar">未</div><div class="user-name" id="userName">点击登录</div></div>
    </div>
    <div class="main-content">
      <div class="welcome-container" id="welcomeScreen">
        <img src="logo.jpg" alt="赚好多能虾助手" class="welcome-logo">
        <h1 class="welcome-title">你好，我是赚好多能虾助手</h1>
        <p class="welcome-subtitle">让 AI 真正为你工作</p>
        <div class="suggestion-grid" id="suggestions"></div>
      </div>
      <div class="chat-container hidden" id="chatScreen">
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
          <div class="input-wrapper">
            <div class="toolbar" id="toolbar">
              <button class="tool-btn" onclick="quickAction('search')">🔍 搜索</button>
              <button class="tool-btn" onclick="quickAction('write')">✍️ 写作</button>
              <button class="tool-btn" onclick="quickAction('analyze')">📊 分析</button>
              <button class="tool-btn" onclick="quickAction('translate')">🌐 翻译</button>
            </div>
            <div class="input-box">
              <textarea id="messageInput" placeholder="发消息..." rows="1" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,150)+'px'" onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            </div>
            <button class="send-btn" onclick="sendMessage()"><svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    const API_BASE = 'http://8.129.98.129/api/v1';
    let token = localStorage.getItem('lobster_token');
    let user = null;
    let currentSessionId = null;
    const suggestions = [
      { icon: '🔍', text: '搜索人工智能 2026 年最新进展' },
      { icon: '📝', text: '帮我写一份周报' },
      { icon: '📊', text: '分析这个 Excel 数据' },
      { icon: '✉️', text: '写一封商务邮件' },
      { icon: '📸', text: '识别图片中的文字' },
      { icon: '📚', text: '制定 Python 学习计划' },
      { icon: '🌐', text: '翻译这段英文' },
      { icon: '💻', text: '帮我写一个 Python 脚本' }
    ];
    function init() {
      const container = document.getElementById('suggestions');
      suggestions.forEach(s => {
        const card = document.createElement('div');
        card.className = 'suggestion-card';
        card.innerHTML = '<div class="suggestion-icon">'+s.icon+'</div><div class="suggestion-text">'+s.text+'</div>';
        card.onclick = () => useSuggestion(s.text);
        container.appendChild(card);
      });
      if (token) loadUserInfo();
    }
    function useSuggestion(text) {
      if (!token) { showLogin(); return; }
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');
      document.getElementById('messageInput').value = text;
      sendMessage();
    }
    function showUserMenu() {
      if (user) {
        if (confirm('确定要退出登录吗？')) {
          localStorage.removeItem('lobster_token');
          token = null;
          user = null;
          location.reload();
        }
        return;
      }
      showLogin();
    }
    function showLogin() {
      alert('请使用测试账号登录：\n手机号：17724620007\n密码：Wujian886+');
    }
    function loadUserInfo() {
      fetch(API_BASE + '/auth/me', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            user = data.data;
            document.getElementById('userAvatar').textContent = (user.nickname || user.phone || '用户').charAt(0).toUpperCase();
            document.getElementById('userName').textContent = user.nickname || user.phone || '用户';
            loadHistory();
          } else { logout(); }
        })
        .catch(() => logout());
    }
    function logout() {
      localStorage.removeItem('lobster_token');
      token = null;
      user = null;
      location.reload();
    }
    function newChat() {
      if (!token) { showLogin(); return; }
      currentSessionId = null;
      document.getElementById('messagesContainer').innerHTML = '';
      document.getElementById('welcomeScreen').classList.remove('hidden');
      document.getElementById('chatScreen').classList.add('hidden');
      document.getElementById('messageInput').value = '';
    }
    function loadHistory() {
      if (!token) return;
      fetch(API_BASE + '/chat/sessions', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(res => res.json())
        .then(data => {
          const list = document.getElementById('historyList');
          if (data.success && data.data.length > 0) {
            list.innerHTML = data.data.slice(0, 20).map(item => '<div class="history-item" onclick="loadSession(\\''+item.id+'\\',this)">'+(item.title || '新对话')+'</div>').join('');
          } else {
            list.innerHTML = '<div style="color:#999;font-size:13px;padding:8px;">暂无对话</div>';
          }
        });
    }
    function loadSession(sessionId, element) {
      if (!token) { showLogin(); return; }
      currentSessionId = sessionId;
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');
      const container = document.getElementById('messagesContainer');
      container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">加载中...</div>';
      fetch(API_BASE + '/chat/messages/' + sessionId, { headers: { 'Authorization': 'Bearer ' + token } })
        .then(res => res.json())
        .then(data => {
          if (data.success && data.data.length > 0) {
            container.innerHTML = '';
            data.data.forEach(msg => appendMessage(msg.role, msg.content));
            container.scrollTop = container.scrollHeight;
          } else {
            container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">暂无消息</div>';
          }
          document.querySelectorAll('.history-item').forEach(item => item.classList.remove('active'));
          if (element) element.classList.add('active');
        })
        .catch(e => {
          container.innerHTML = '<div style="text-align:center;color:#f00;padding:40px;">加载失败</div>';
        });
    }
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;
      if (!token) { showLogin(); return; }
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');
      appendMessage('user', message);
      input.value = '';
      input.style.height = 'auto';
      fetch(API_BASE + '/chat/send', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ message, sessionId: currentSessionId })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          currentSessionId = data.data.sessionId;
          streamMessage(data.data.response.content);
          loadHistory();
        } else {
          alert(data.error || '发送失败');
        }
      })
      .catch(e => alert('网络错误：' + e.message));
    }
    function appendMessage(role, content) {
      const container = document.getElementById('messagesContainer');
      const wrapper = document.createElement('div');
      wrapper.className = 'message-wrapper ' + role;
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'user' ? '我' : '🦞';
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = marked.parse(content);
      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      container.scrollTop = container.scrollHeight;
    }
    function streamMessage(content) {
      const container = document.getElementById('messagesContainer');
      const wrapper = document.createElement('div');
      wrapper.className = 'message-wrapper assistant';
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = '🦞';
      const bubble = document.createElement('div');
      bubble.className = 'message-bubble';
      bubble.innerHTML = '<span style="color:#999;">🦞 思考中...</span>';
      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      let displayContent = '';
      let charIndex = 0;
      const typeInterval = setInterval(() => {
        if (charIndex < content.length) {
          displayContent += content[charIndex];
          bubble.innerHTML = marked.parse(displayContent);
          container.scrollTop = container.scrollHeight;
          charIndex++;
        } else {
          clearInterval(typeInterval);
        }
      }, 30);
    }
    function quickAction(type) {
      if (!token) { showLogin(); return; }
      const templates = { 'search': '帮我搜索：', 'write': '帮我写：', 'analyze': '帮我分析：', 'translate': '帮我翻译：' };
      document.getElementById('welcomeScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');
      document.getElementById('messageInput').value = templates[type];
      document.getElementById('messageInput').focus();
    }
    init();
  </script>
</body>
</html>
