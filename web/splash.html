<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>能虾助手 - 启动页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .logo-container {
      text-align: center;
      animation: fadeInUp 0.8s ease;
    }

    .logo {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: bounce 2s infinite;
    }

    .title {
      color: white;
      font-size: 32px;
      font-weight: bold;
      margin-top: 30px;
      margin-bottom: 10px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .slogan {
      color: rgba(255,255,255,0.9);
      font-size: 16px;
      margin-bottom: 50px;
    }

    .loading {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .loading-dot {
      width: 12px;
      height: 12px;
      background: white;
      border-radius: 50%;
      animation: loading 1.4s infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes loading {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-10px); }
    }

    /* 功能亮点 */
    .features {
      position: absolute;
      bottom: 100px;
      text-align: center;
      color: white;
      opacity: 0;
      animation: fadeIn 0.5s ease 1s forwards;
    }

    .features ul {
      list-style: none;
      text-align: left;
    }

    .features li {
      padding: 8px 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .features li::before {
      content: '✅';
      margin-right: 8px;
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* 进入按钮 */
    .enter-btn {
      position: absolute;
      bottom: 50px;
      padding: 15px 50px;
      background: white;
      color: #667eea;
      border: none;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      opacity: 0;
      animation: fadeIn 0.5s ease 1.5s forwards;
    }

    .enter-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    }

    .enter-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="logo-container">
    <img src="/static/logo.png" alt="能虾助手 Logo" class="logo">
    <h1 class="title">能虾助手</h1>
    <p class="slogan">让 AI 真正为你工作</p>
  </div>

  <div class="features">
    <ul>
      <li>AI 智能对话</li>
      <li>Excel 数据分析</li>
      <li>周报日报写作</li>
      <li>图片 OCR 识别</li>
      <li>语音输入</li>
    </ul>
  </div>

  <div class="loading">
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
    <div class="loading-dot"></div>
  </div>

  <button class="enter-btn" onclick="enterApp()">进入应用</button>

  <script>
    // 3 秒后自动跳转
    setTimeout(() => {
      enterApp();
    }, 3000);

    function enterApp() {
      // 跳转到主页
      window.location.href = '/index.html';
    }

    // 阻止返回
    history.pushState(null, null, document.URL);
    window.addEventListener('popstate', function () {
      history.pushState(null, null, document.URL);
    });
  </script>
</body>
</html>
