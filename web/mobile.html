<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#667eea">
  <title>能虾助手 - 让 AI 真正为你工作</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: #fff; height: 100vh; height: 100dvh; overflow: hidden; }
    
    /* 登录弹窗 */
    .login-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
    .login-modal.active { display: flex; }
    .login-box { background: white; border-radius: 20px; padding: 30px 20px; width: 100%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    .login-title { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 30px; color: #1a1a1a; }
    .login-input { width: 100%; padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 12px; font-size: 16px; margin-bottom: 16px; -webkit-appearance: none; }
    .login-input:focus { outline: none; border-color: #667eea; }
    .login-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; }
    .login-btn:active { transform: scale(0.98); }
    .close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 28px; color: #999; cursor: pointer; padding: 5px; }
    
    /* 主界面 */
    .app { display: flex; height: 100%; }
    
    /* 侧边栏 (桌面端) */
    .sidebar { width: 280px; background: #fafafa; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; padding: 16px; }
    .logo { display: flex; align-items: center; gap: 12px; padding: 12px; margin-bottom: 20px; }
    .logo-img { width: 40px; height: 40px; border-radius: 10px; }
    .logo-text { font-size: 18px; font-weight: 600; color: #1a1a1a; }
    .new-chat-btn { width: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; min-height: 44px; }
    .history { flex: 1; overflow-y: auto; }
    .history-title { font-size: 12px; color: #999; margin-bottom: 12px; padding: 0 8px; }
    .history-item { padding: 12px; border-radius: 8px; cursor: pointer; color: #333; margin-bottom: 4px; min-height: 44px; display: flex; align-items: center; }
    .history-item:active { background: #f0f0f0; }
    .user-area { padding-top: 16px; border-top: 1px solid #f0f0f0; display: flex; align-items: center; gap: 12px; cursor: pointer; padding: 12px; border-radius: 8px; min-height: 44px; }
    .user-avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; flex-shrink: 0; }
    .user-name { flex: 1; font-size: 14px; color: #333; overflow: hidden; text-overflow: ellipsis; }
    
    /* 主内容区 */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    /* 头部 (移动端) */
    .mobile-header { display: none; align-items: center; justify-content: space-between; padding: 12px 16px; background: white; border-bottom: 1px solid #f0f0f0; min-height: 56px; }
    .menu-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 8px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; }
    
    /* 聊天容器 */
    .chat-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    
    /* 欢迎界面 */
    .welcome { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; overflow-y: auto; }
    .welcome-logo { width: 100px; height: 100px; border-radius: 20px; box-shadow: 0 10px 40px rgba(102,126,234,0.3); margin-bottom: 24px; }
    .welcome-title { font-size: 28px; font-weight: 600; color: #1a1a1a; margin-bottom: 12px; text-align: center; }
    .welcome-subtitle { font-size: 16px; color: #666; margin-bottom: 40px; text-align: center; }
    .suggestions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 700px; }
    .suggestion-card { background: #fafafa; border: 1px solid #f0f0f0; border-radius: 12px; padding: 16px; cursor: pointer; min-height: 80px; display: flex; flex-direction: column; justify-content: center; }
    .suggestion-card:active { background: #f0f0f0; }
    .suggestion-icon { font-size: 24px; margin-bottom: 8px; }
    .suggestion-text { font-size: 14px; color: #333; line-height: 1.4; }
    
    /* 消息列表 */
    .messages { flex: 1; overflow-y: auto; padding: 20px; -webkit-overflow-scrolling: touch; }
    .message { display: flex; gap: 12px; margin-bottom: 20px; max-width: 800px; margin-left: auto; margin-right: auto; }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 600; flex-shrink: 0; min-width: 36px; }
    .message.assistant .avatar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .message.user .avatar { background: #f0f0f0; color: #666; }
    .bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 15px; word-wrap: break-word; white-space: pre-wrap; }
    .message.assistant .bubble { background: #fafafa; color: #1a1a1a; border-bottom-left-radius: 4px; }
    .message.user .bubble { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-bottom-right-radius: 4px; }
    
    /* 输入区 */
    .input-area { padding: 16px; border-top: 1px solid #f0f0f0; background: white; }
    .input-wrapper { max-width: 800px; margin: 0 auto; position: relative; }
    .input-box { background: #fafafa; border: 1px solid #f0f0f0; border-radius: 20px; padding: 12px 50px 12px 16px; display: flex; align-items: flex-end; min-height: 44px; }
    .input-box:focus-within { border-color: #667eea; background: white; }
    .input-box textarea { flex: 1; border: none; outline: none; background: transparent; font-size: 16px; resize: none; max-height: 120px; font-family: inherit; line-height: 1.5; min-height: 20px; }
    .send-btn { position: absolute; right: 8px; bottom: 8px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; min-width: 44px; min-height: 44px; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
    
    /* 移动端适配 */
    @media (max-width: 768px) {
      .sidebar { position: fixed; left: -100%; top: 0; bottom: 0; width: 85%; max-width: 320px; background: white; z-index: 100; transition: left 0.3s ease; box-shadow: 2px 0 20px rgba(0,0,0,0.1); }
      .sidebar.open { left: 0; }
      .sidebar-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99; display: none; }
      .sidebar-overlay.active { display: block; }
      .mobile-header { display: flex; }
      .welcome { padding: 20px 16px; }
      .welcome-logo { width: 80px; height: 80px; }
      .welcome-title { font-size: 22px; }
      .welcome-subtitle { font-size: 14px; }
      .suggestions { grid-template-columns: 1fr; gap: 10px; }
      .suggestion-card { min-height: 70px; padding: 14px; }
      .messages { padding: 16px 12px; padding-top: 12px; }
      .bubble { max-width: 85%; padding: 10px 14px; font-size: 14px; }
      .input-area { padding: 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); }
      .login-box { margin: 16px; border-radius: 16px; padding: 24px 16px; }
      .login-title { font-size: 20px; }
    }
    
    /* 安全区域适配 */
    @supports (padding: max(0px)) {
      .mobile-header { padding-top: max(12px, env(safe-area-inset-top)); }
      .input-area { padding-bottom: max(12px, env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>
  <!-- 登录弹窗 -->
  <div class="login-modal" id="loginModal">
    <div class="login-box" style="position: relative;">
      <button class="close-btn" onclick="closeLogin()">&times;</button>
      <h2 class="login-title">登录能虾助手</h2>
      <input type="tel" class="login-input" id="loginPhone" placeholder="手机号" autocomplete="tel">
      <input type="password" class="login-input" id="loginPassword" placeholder="密码" autocomplete="current-password">
      <button class="login-btn" onclick="handleLogin()">登录</button>
      <p style="text-align:center;margin-top:15px;color:#666;font-size:14px;">测试账号：17724620007 / Wujian886+</p>
    </div>
  </div>

  <!-- 侧边栏遮罩 -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <div class="app">
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
      <div class="logo">
        <img src="logo.jpg" alt="能虾助手" class="logo-img">
        <span class="logo-text">能虾助手</span>
      </div>
      <button class="new-chat-btn" onclick="newChat()">
        <span>+</span> 新建对话
      </button>
      <div class="history">
        <div class="history-title">最近对话</div>
        <div id="historyList"></div>
      </div>
      <div class="user-area" onclick="showUserMenu()">
        <div class="user-avatar" id="userAvatar">未</div>
        <div class="user-name" id="userName">点击登录</div>
      </div>
    </div>

    <!-- 主内容区 -->
    <div class="main">
      <!-- 移动端头部 -->
      <div class="mobile-header">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <span style="font-weight:600;font-size:18px;">能虾助手</span>
        <div style="width:44px;"></div>
      </div>

      <div class="chat-container">
        <!-- 欢迎界面 -->
        <div class="welcome" id="welcomeScreen">
          <img src="logo.jpg" alt="能虾助手" class="welcome-logo">
          <h1 class="welcome-title">你好，我是能虾助手</h1>
          <p class="welcome-subtitle">让 AI 真正为你工作</p>
          <div class="suggestions" id="suggestions"></div>
        </div>

        <!-- 消息列表 -->
        <div class="messages" id="messagesContainer" style="display:none;"></div>

        <!-- 输入区 -->
        <div class="input-area">
          <div class="input-wrapper">
            <div class="input-box">
              <textarea id="messageInput" placeholder="发消息..." rows="1" oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'" onkeypress="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
            </div>
            <button class="send-btn" onclick="sendMessage()">
              <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://8.129.98.129/api/v1';
    let token = localStorage.getItem('lobster_token');
    let user = null;
    let currentSessionId = null;

    const suggestions = [
      { icon: '🔍', text: '搜索人工智能 2026 年最新进展' },
      { icon: '📝', text: '帮我写一份周报' },
      { icon: '📊', text: '分析这个 Excel 数据' },
      { icon: '✉️', text: '写一封商务邮件' }
    ];

    function init() {
      const container = document.getElementById('suggestions');
      suggestions.forEach(s => {
        const card = document.createElement('div');
        card.className = 'suggestion-card';
        card.innerHTML = '<div class="suggestion-icon">'+s.icon+'</div><div class="suggestion-text">'+s.text+'</div>';
        card.onclick = () => useSuggestion(s.text);
        container.appendChild(card);
      });
      if (token) loadUserInfo();
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('sidebarOverlay').classList.toggle('active');
    }

    function showLogin() {
      document.getElementById('loginModal').classList.add('active');
    }

    function closeLogin() {
      document.getElementById('loginModal').classList.remove('active');
    }

    function showUserMenu() {
      if (user) {
        if (confirm('确定要退出登录吗？')) {
          localStorage.removeItem('lobster_token');
          token = null;
          user = null;
          location.reload();
        }
      } else {
        showLogin();
      }
    }

    async function handleLogin() {
      const phone = document.getElementById('loginPhone').value;
      const password = document.getElementById('loginPassword').value;
      
      if (!phone || !password) {
        alert('请填写手机号和密码');
        return;
      }

      try {
        const res = await fetch(API_BASE + '/auth/login/phone', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, password })
        });
        const data = await res.json();
        
        if (data.success) {
          token = data.data.token;
          localStorage.setItem('lobster_token', token);
          user = data.data;
          updateUserInfo(data.data);
          closeLogin();
          loadHistory();
          alert('登录成功！');
        } else {
          alert(data.error || '登录失败');
        }
      } catch (e) {
        alert('网络错误：' + e.message);
      }
    }

    function updateUserInfo(userData) {
      const initial = (userData.nickname || userData.phone || '用户').charAt(0).toUpperCase();
      document.getElementById('userAvatar').textContent = initial;
      document.getElementById('userName').textContent = userData.nickname || userData.phone || '用户';
    }

    function loadUserInfo() {
      fetch(API_BASE + '/auth/me', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          user = data.data;
          updateUserInfo(data.data);
          loadHistory();
        } else {
          localStorage.removeItem('lobster_token');
        }
      })
      .catch(() => {
        localStorage.removeItem('lobster_token');
      });
    }

    function newChat() {
      if (!token) { showLogin(); return; }
      currentSessionId = null;
      document.getElementById('messagesContainer').innerHTML = '';
      document.getElementById('messagesContainer').style.display = 'none';
      document.getElementById('welcomeScreen').style.display = 'flex';
      document.getElementById('messageInput').value = '';
      if (window.innerWidth <= 768) toggleSidebar();
    }

    function loadHistory() {
      if (!token) return;
      fetch(API_BASE + '/chat/sessions', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('historyList');
        if (data.success && data.data.length > 0) {
          list.innerHTML = data.data.slice(0, 20).map(item => 
            '<div class="history-item" onclick="loadSession(\\''+item.id+'\\',this)">'+
            (item.title || '新对话')+'</div>'
          ).join('');
        } else {
          list.innerHTML = '<div style="color:#999;padding:8px;">暂无对话</div>';
        }
      });
    }

    function loadSession(sessionId, element) {
      if (!token) { showLogin(); return; }
      currentSessionId = sessionId;
      document.getElementById('welcomeScreen').style.display = 'none';
      document.getElementById('messagesContainer').style.display = 'block';
      
      const container = document.getElementById('messagesContainer');
      container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">加载中...</div>';
      
      fetch(API_BASE + '/chat/messages/' + sessionId, {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      .then(res => res.json())
      .then(data => {
        if (data.success && data.data.length > 0) {
          container.innerHTML = '';
          data.data.forEach(msg => appendMessage(msg.role, msg.content));
          container.scrollTop = container.scrollHeight;
        } else {
          container.innerHTML = '<div style="text-align:center;color:#999;padding:40px;">暂无消息</div>';
        }
        document.querySelectorAll('.history-item').forEach(i => i.classList.remove('active'));
        if (element) element.classList.add('active');
      })
      .catch(e => {
        container.innerHTML = '<div style="text-align:center;color:#f00;padding:40px;">加载失败</div>';
      });
    }

    function useSuggestion(text) {
      if (!token) { showLogin(); return; }
      document.getElementById('welcomeScreen').style.display = 'none';
      document.getElementById('messagesContainer').style.display = 'block';
      document.getElementById('messageInput').value = text;
      sendMessage();
    }

    function appendMessage(role, content) {
      const container = document.getElementById('messagesContainer');
      const wrapper = document.createElement('div');
      wrapper.className = 'message ' + role;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '我' : '🦞';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = content;
      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      container.appendChild(wrapper);
      container.scrollTop = container.scrollHeight;
    }

    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      if (!message) return;
      if (!token) { showLogin(); return; }
      
      document.getElementById('welcomeScreen').style.display = 'none';
      document.getElementById('messagesContainer').style.display = 'block';
      
      appendMessage('user', message);
      input.value = '';
      input.style.height = 'auto';
      
      fetch(API_BASE + '/chat/send', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ message, sessionId: currentSessionId })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          currentSessionId = data.data.sessionId;
          appendMessage('assistant', data.data.response.content);
          loadHistory();
        } else {
          alert(data.error || '发送失败');
        }
      })
      .catch(e => {
        alert('网络错误：' + e.message);
      });
    }

    init();
  </script>
</body>
</html>
