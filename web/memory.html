<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赚好多能虾助手 - 记忆系统</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    .container { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: rgba(255,255,255,0.95); padding: 20px; display: flex; flex-direction: column; }
    .logo { display: flex; align-items: center; gap: 12px; padding: 15px; margin-bottom: 20px; }
    .logo-img { width: 48px; height: 48px; }
    .logo-text { font-size: 20px; font-weight: 600; color: #333; }
    .nav-btn { background: none; border: none; padding: 12px 15px; text-align: left; cursor: pointer; border-radius: 8px; color: #555; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
    .nav-btn:hover { background: rgba(102, 126, 234, 0.1); }
    .nav-btn.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .main { flex: 1; display: flex; flex-direction: column; max-width: 1200px; margin: 0 auto; width: 100%; }
    .header { background: rgba(255,255,255,0.95); padding: 20px 40px; border-bottom: 1px solid #eee; }
    .header h1 { font-size: 24px; color: #333; }
    .content { flex: 1; padding: 40px; overflow-y: auto; }
    .card { background: white; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .card h2 { font-size: 18px; color: #333; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .stat-item { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 12px; text-align: center; }
    .stat-value { font-size: 32px; font-weight: 700; }
    .stat-label { font-size: 14px; opacity: 0.9; margin-top: 5px; }
    .memory-list { max-height: 400px; overflow-y: auto; }
    .memory-item { padding: 15px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 10px; }
    .memory-item:hover { border-color: #667eea; }
    .memory-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .memory-type { background: #667eea; color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    .memory-importance { color: #f59e0b; }
    .memory-content { color: #666; line-height: 1.5; }
    .memory-date { font-size: 12px; color: #999; margin-top: 8px; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-secondary { background: #f0f0f0; color: #666; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab { padding: 10px 20px; background: #f0f0f0; border: none; border-radius: 8px; cursor: pointer; }
    .tab.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .hidden { display: none; }
    @media (max-width: 768px) { .sidebar { display: none; } .content { padding: 20px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="sidebar">
      <div class="logo"><img src="logo.jpg" class="logo-img"><div class="logo-text">赚好多能虾助手</div></div>
      <button class="nav-btn" onclick="showPage('chat')">💬 对话</button>
      <button class="nav-btn" onclick="showPage('memory')">🧠 记忆</button>
      <button class="nav-btn" onclick="showPage('preferences')">⚙️ 偏好</button>
      <button class="nav-btn" onclick="showPage('history')">📜 历史</button>
      <div style="flex:1"></div>
      <div class="nav-btn" onclick="logout()">🚪 退出</div>
    </div>
    <div class="main">
      <div class="header">
        <h1 id="pageTitle">记忆系统</h1>
      </div>
      <div class="content">
        <!-- 记忆概览页面 -->
        <div id="page-memory" class="page">
          <div class="card">
            <h2>📊 记忆统计</h2>
            <div class="stat-grid" id="memoryStats"></div>
          </div>
          <div class="card">
            <h2>🧠 最近记忆</h2>
            <div class="memory-list" id="recentMemories"></div>
          </div>
        </div>

        <!-- 偏好设置页面 -->
        <div id="page-preferences" class="page hidden">
          <div class="card">
            <h2>⚙️ 用户偏好</h2>
            <div class="form-group">
              <label>语言</label>
              <select id="prefLanguage">
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">繁體中文</option>
                <option value="en-US">English</option>
              </select>
            </div>
            <div class="form-group">
              <label>时区</label>
              <select id="prefTimezone">
                <option value="Asia/Shanghai">上海 (UTC+8)</option>
                <option value="Asia/Hong_Kong">香港 (UTC+8)</option>
                <option value="America/New_York">纽约 (UTC-5)</option>
                <option value="Europe/London">伦敦 (UTC+0)</option>
              </select>
            </div>
            <div class="form-group">
              <label>主题</label>
              <select id="prefTheme">
                <option value="light">浅色模式</option>
                <option value="dark">深色模式</option>
              </select>
            </div>
            <button class="btn btn-primary" onclick="savePreferences()">💾 保存偏好</button>
          </div>
        </div>

        <!-- 记忆列表页面 -->
        <div id="page-history" class="page hidden">
          <div class="card">
            <h2>📜 对话历史</h2>
            <div class="tabs">
              <button class="tab active" onclick="filterHistory('all')">全部</button>
              <button class="tab" onclick="filterHistory('user')">用户</button>
              <button class="tab" onclick="filterHistory('assistant')">助手</button>
            </div>
            <div class="memory-list" id="conversationHistory"></div>
          </div>
        </div>

        <!-- 对话页面 -->
        <div id="page-chat" class="page hidden">
          <div class="card">
            <h2>💬 对话界面（开发中）</h2>
            <p>请前往主界面使用对话功能</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = 'http://8.129.98.129/api/v1';
    let token = localStorage.getItem('lobster_token');
    let currentFilter = 'all';

    // 页面初始化
    async function init() {
      if (!token) {
        window.location.href = '/';
        return;
      }
      await loadMemorySummary();
      await loadPreferences();
    }

    // 切换页面
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
      document.getElementById('page-' + page).classList.remove('hidden');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      
      const titles = {
        'chat': '💬 对话',
        'memory': '🧠 记忆',
        'preferences': '⚙️ 偏好',
        'history': '📜 历史'
      };
      document.getElementById('pageTitle').textContent = titles[page];

      if (page === 'history') loadConversationHistory();
    }

    // 加载记忆摘要
    async function loadMemorySummary() {
      try {
        const res = await fetch(API_BASE + '/memory/summary', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        
        if (data.success && data.data) {
          const { stats, recentMemories } = data.data;
          
          // 显示统计
          document.getElementById('memoryStats').innerHTML = `
            <div class="stat-item">
              <div class="stat-value">${stats.totalMemories || 0}</div>
              <div class="stat-label">总记忆数</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${stats.totalConversations || 0}</div>
              <div class="stat-label">对话记录</div>
            </div>
            <div class="stat-item">
              <div class="stat-value">${stats.totalTokens || 0}</div>
              <div class="stat-label">Token 总数</div>
            </div>
          `;

          // 显示最近记忆
          if (recentMemories && recentMemories.length > 0) {
            document.getElementById('recentMemories').innerHTML = recentMemories.map(m => `
              <div class="memory-item">
                <div class="memory-header">
                  <span class="memory-type">${m.type}</span>
                  <span class="memory-importance">${'⭐'.repeat(m.importance)}</span>
                </div>
                <div class="memory-content">${m.content}</div>
                <div class="memory-date">${new Date(m.created_at).toLocaleString('zh-CN')}</div>
              </div>
            `).join('');
          } else {
            document.getElementById('recentMemories').innerHTML = '<div style="color:#999;text-align:center;padding:20px;">暂无记忆</div>';
          }
        }
      } catch (error) {
        console.error('加载记忆失败', error);
      }
    }

    // 加载偏好设置
    async function loadPreferences() {
      try {
        const res = await fetch(API_BASE + '/memory/preferences', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        
        if (data.success && data.data) {
          const pref = data.data;
          document.getElementById('prefLanguage').value = pref.language || 'zh-CN';
          document.getElementById('prefTimezone').value = pref.timezone || 'Asia/Shanghai';
          document.getElementById('prefTheme').value = pref.theme || 'light';
        }
      } catch (error) {
        console.error('加载偏好失败', error);
      }
    }

    // 保存偏好设置
    async function savePreferences() {
      const preferences = {
        language: document.getElementById('prefLanguage').value,
        timezone: document.getElementById('prefTimezone').value,
        theme: document.getElementById('prefTheme').value,
        notificationsEnabled: true
      };

      try {
        const res = await fetch(API_BASE + '/memory/preferences', {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(preferences)
        });
        const data = await res.json();
        
        if (data.success) {
          alert('✅ 偏好已保存');
        } else {
          alert('❌ 保存失败：' + data.error);
        }
      } catch (error) {
        alert('网络错误');
      }
    }

    // 加载对话历史
    async function loadConversationHistory() {
      try {
        const res = await fetch(API_BASE + '/memory/history?limit=50', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json();
        
        if (data.success) {
          let history = data.data;
          if (currentFilter !== 'all') {
            history = history.filter(h => h.role === currentFilter);
          }
          
          document.getElementById('conversationHistory').innerHTML = history.map(h => `
            <div class="memory-item">
              <div class="memory-header">
                <span class="memory-type" style="background:${h.role === 'user' ? '#667eea' : '#07c160'}">${h.role === 'user' ? '👤 我' : '🦞 助手'}</span>
                <span class="memory-date">${new Date(h.created_at).toLocaleString('zh-CN')}</span>
              </div>
              <div class="memory-content">${h.content}</div>
            </div>
          `).join('');
        }
      } catch (error) {
        console.error('加载历史失败', error);
      }
    }

    // 过滤历史
    function filterHistory(filter) {
      currentFilter = filter;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      event.target.classList.add('active');
      loadConversationHistory();
    }

    // 退出登录
    function logout() {
      if (confirm('确定要退出登录吗？')) {
        localStorage.removeItem('lobster_token');
        window.location.href = '/';
      }
    }

    // 启动
    init();
  </script>
</body>
</html>
